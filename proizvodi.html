<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proizvodi | Elegance Suits</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <span class="logo-text">ELEGANCE</span>
                    <span class="logo-subtext">SUITS</span>
                </a>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span class="hamburger"></span>
                </button>
                <ul class="nav-menu">
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <h1>Naša Kolekcija</h1>
        <p>Otkrijte širok izbor elegantnih odela za svaku priliku</p>
    </section>

    <section class="products-page">
        <div class="container">
            <div class="filter-section">
                <div class="filter-group">
                    <label for="category-filter">Kategorija:</label>
                    <select id="category-filter">
                        <option value="sve">Sve kategorije</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-filter">Sortiraj:</label>
                    <select id="sort-filter">
                        <option value="default">Podrazumevano</option>
                        <option value="price-asc">Cena: Rastuće</option>
                        <option value="price-desc">Cena: Opadajuće</option>
                        <option value="name-asc">Naziv: A-Z</option>
                        <option value="name-desc">Naziv: Z-A</option>
                    </select>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Pretraži proizvode...">
                    <button id="search-btn" class="btn-search">Pretraži</button>
                </div>
            </div>

            <div class="all-products-grid" id="all-products">
            </div>

            <div id="pagination-wrapper" class="pagination-wrapper">
                <button id="btn-load-more" class="btn btn-load-more">Prikaži više</button>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid" id="footer-main-grid"></div>
            <div class="footer-bottom" id="footer-copy-space"></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    </body>
</html>
